# ─── KVRN Deploy to Cloudflare Workers ────────────────────────────────────────
#
# Triggers:
#   - Push to main         → deploys to production (kvrn.com)
#   - Push to any PR       → deploys to preview environment
#
# SETUP:
#   Add these secrets to GitHub repo (Settings → Secrets → Actions):
#     CF_API_TOKEN      — Cloudflare API token with Workers edit permission
#     CF_ACCOUNT_ID     — Your Cloudflare account ID
#
#   All other secrets (STRIPE_SECRET_KEY, etc.) are set via:
#     npx wrangler secret put STRIPE_SECRET_KEY
#   Not via GitHub Actions — they live in Cloudflare Workers.

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ./kvrn

      - name: Type check
        run: npm run type-check
        working-directory: ./kvrn

      - name: Build (Next.js)
        run: npm run build
        working-directory: ./kvrn
        env:
          NEXT_PUBLIC_SITE_URL:          ${{ github.ref == 'refs/heads/main' && 'https://kvrn.com' || 'https://kvrn-preview.workers.dev' }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

      - name: Build (OpenNext for Cloudflare)
        run: npx opennextjs-cloudflare build
        working-directory: ./kvrn
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (production)
        if: github.ref == 'refs/heads/main'
        run: npx wrangler deploy --env production
        working-directory: ./kvrn
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (preview)
        if: github.ref != 'refs/heads/main'
        run: npx wrangler deploy --env preview
        working-directory: ./kvrn
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
